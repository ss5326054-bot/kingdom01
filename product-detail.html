<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Details | NIVASA</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@200;300;400;500;700&display=swap" rel="stylesheet">
</head>
<body class="detail-page">
    <a href="index.html#collection" id="back-btn" class="top-back-btn">
        <svg class="back-arrow" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
        Back
    </a>
    <nav class="navbar detail-nav" id="main-nav">
        <a href="index.html" class="logo">NIVASA</a>
        <div class="nav-links" id="nav-links">
            <a href="index.html#collection">Back to Collection</a>
        </div>
        <div class="nav-right">
            <div class="cart-btn" id="cart-main-btn">Cart (0)</div>
            <button class="hamburger" id="hamburger" aria-label="Toggle menu">
                <span></span><span></span><span></span>
            </button>
        </div>
    </nav>

    <main class="product-detail-container">
        <div class="detail-grid">
            <div class="detail-image-section">
                <div class="image-zoom-container">
                    <img id="main-product-image" src="" alt="Product Image">
                </div>
            </div>
            
            <div class="detail-info-section">
                <h1 id="product-title">Loading...</h1>
                <p class="product-price" id="product-price"></p>
                <div class="product-description">
                    <p id="product-desc"></p>
                </div>

                <div class="color-selection">
                    <h3>Light Ambiance</h3>
                    <div class="color-swatches" id="color-swatches">
                        <!-- Dynamic Swatches -->
                    </div>
                </div>

                <div class="detail-actions">
                    <button class="cta-button secondary" id="buy-now">Buy Now</button>
                    <button class="cta-button buy-now" id="add-to-cart">Add to Cart</button>
                </div>
            </div>
        </div>

        <section class="similar-products">
            <div class="section-header">
                <h2>Similar Masterpieces</h2>
            </div>
            <div class="product-grid" id="similar-grid">
                <!-- Dynamic Suggestions -->
            </div>
        </section>
    </main>

    <div class="cart-overlay"></div>
    <div class="cart-drawer" id="cart-drawer">
        <div class="cart-header">
            <h2>Your Cart</h2>
            <button class="close-cart" id="close-cart-btn">&times;</button>
        </div>
        <div class="cart-items-container" id="cart-items">
            <!-- Dynamic Items -->
        </div>
        <div class="cart-footer">
            <div class="cart-total">
                <span>Total</span>
                <span class="cart-total-price" id="cart-total-price">₹0</span>
            </div>
            <button class="proceed-btn" id="proceed-checkout">Proceed to Checkout</button>
        </div>
    </div>

    <!-- lenis -->
    <script src="https://unpkg.com/@studio-freight/lenis@1.0.35/dist/lenis.min.js"></script>
    <!-- gsap -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>
    
    <script src="js/app.js"></script>
</body>
</html>
